<footer class="site-footer" id="site-footer">
  <div class="container footer-main">
    <div class="footer-brand">
      <p><strong>Kiran Shahi</strong></p>
      <p>AI Researcher | Computer Vision | Medical Imaging | Sustainable AI Systems</p>
      <p>© 2026 Kiran Shahi. All rights reserved.</p>

    <nav class="footer-links" aria-label="Footer links">
      {% for item in site.nav_items limit: 6 %}
        <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
      {% endfor %}
    </nav>

    <div class="footer-social" aria-label="Social links">
      <a href="{{ site.social.github }}" target="_blank" rel="noopener" aria-label="GitHub"><i class="fab fa-github"></i></a>
      <a href="{{ site.social.scholar }}" target="_blank" rel="noopener" aria-label="Google Scholar"><i class="fas fa-graduation-cap"></i></a>
      <a href="{{ site.social.linkedin }}" target="_blank" rel="noopener" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
      <a href="{{ site.social.researchgate }}" target="_blank" rel="noopener" aria-label="ResearchGate"><i class="fab fa-researchgate"></i></a>
      <a href="{{ site.social.orcid }}" target="_blank" rel="noopener" aria-label="ORCID"><i class="fas fa-id-badge"></i></a>
    </div>
  </div>
