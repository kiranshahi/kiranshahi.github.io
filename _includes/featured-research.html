<section class="featured-projects">
  <div class="section-heading section-heading--center">
    <h2>Featured Projects</h2>
    <span aria-hidden="true"></span>
    <p>Selected research and development projects.</p>
  </div>

  <div class="featured-projects__header-actions" aria-hidden="true">
    <button type="button" tabindex="-1"><i class="fas fa-chevron-left"></i></button>
    <button type="button" tabindex="-1"><i class="fas fa-chevron-right"></i></button>
  </div>

  <div class="project-grid">
    {% for project in site.data.research limit: 4 %}
    <a class="project-card" href="{{ project.link }}">
      <div class="project-card__icon">
        {% if project.icon %}
          <i class="{{ project.icon }}" aria-hidden="true"></i>
        {% else %}
          <i class="fas fa-file-medical-alt" aria-hidden="true"></i>
        {% endif %}
      </div>

      <h3>{{ project.title }}</h3>

      {% if project.category %}
      <span class="project-tag">{{ project.category }}</span>
      {% else %}
      <span class="project-tag">Computer Vision</span>
      {% endif %}
    </a>
    {% endfor %}
  </div>
</section>
